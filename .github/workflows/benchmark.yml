name: Benchmark

on:
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run A/B benchmark
        id: bench
        run: |
          set +e
          OUTPUT="$(npm run ab --silent 2>&1)"
          STATUS=$?
          echo "$OUTPUT"
          {
            echo 'output<<BENCH_EOF'
            echo "$OUTPUT"
            echo 'BENCH_EOF'
          } >> "$GITHUB_OUTPUT"
          exit $STATUS

      - name: Post benchmark results as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          BENCH_OUTPUT: ${{ steps.bench.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = process.env.BENCH_OUTPUT || '(no output captured)';
            const body = [
              '## Token Reduction Benchmark',
              '',
              '<details>',
              '<summary>Click to expand benchmark output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
